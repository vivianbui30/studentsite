<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Site Name | Contact Us</title>
    <meta name="description" content="This is a starter HTML + CSS + JS boilerplate set of code for website projects."/>

    <!-- FOR MOBILE / SMALL SCREENS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- MAIN CSS FILE -->
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prata&family=Quicksand:wght@300..700&display=swap" rel="stylesheet"> 
</head>

<body>
    <header class="site-header toggle-nav" data-navstate="closed">
        <div class="container">
            <div class="site-id">
                <h1><a href="index.html"><img src="img/logo.png" alt="Name" width="72" height="72"/></a></h1>
            </div>
            <nav class="site-nav">
                <div class="menu-button navicon">Menu</div>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">

        <section id="projects">
            <div class="container">
                <div class="row-main">
                    <div class="two-thirds column">
                        <h1>Projects</h1>
                        <h3>Branding, Web Design, Animation, & More</h3>
                    </div>
                </div>
            </div>
            
        </section>

        <section id="works">
            <div class="subcontainer withgap">
                <div class="row-sub">
                    <div class="full-width-wrapper">
                        <a href="cocoonwebsite.html"><img src="img/webdesign.jpg" alt="A screen of Cocoon web design" width="2250" height="1485" class="full-width"/></a>
                    </div>
                </div>
                <div class="row-sub">
                    <div class="half-width-wrapper p-top">
                        <a href="tourismlogo.html"><img src="img/tourism_logo.jpg" width="745" height="745"/></a>
                    </div>
                    <div class="half-width-wrapper p-top">
                        <a href="corporatelogo.html"><img src="img/corporate_logo.jpg" width="745" height="745"/></a>
                    </div>  
                </div>
                <div class="row-sub">
                    <div class="full-width-wrapper">
                        <a href="booktrilogy.html"><img src="img/booktrilogy_landscape.jpg" width="3500" height="2450"/></a>
                    </div>
                </div>
                <div class="row-sub">
                    <div class="half-width-wrapper p-top">
                        <a href="kahukufarms.html"><img src="img/motiongraphic.jpg" width="745" height="745"/></a>
                    </div>
                    <div class="half-width-wrapper p-top">
                        <a href="editorial.html"><img src="img/editorial_homepage.jpg" width="745" height="745"/></a>
                    </div>
                </div>
            </div>
                
        </section>
        <section id="contact">
            <div class="column one-third contact">
                <form>
                    <h3>Any questions? Send me a message!</h3>
                    <label for="contact_name">Name:</label>
                    <input type="text" id="contact_name" name="contact_name" />
        
                    <label for="email">Email Address:</label>
                    <input type="text" id="contact_email" name="contact_email" />
        
                    <label for="contact_message">Message:</label>
                    <textarea id="contact_message" name="contact_message"></textarea>
        
                    <input type="submit" value="Get in touch" />
                </form>
            </div>  
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                </ul>
            </nav>
        </div>
    </footer>

        <!-- MAIN JS FILE -->
     <script src="js/script.js"></script>

</body>
</html>
