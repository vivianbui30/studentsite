<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Vivian Bui | Portfolio</title>
    <meta name="description" content="SiteBase: a minimalistic HTML + CSS + JS base front-end framework for simple web site projects."/>

    <!-- FOR MOBILE / SMALL SCREENS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <!-- MAIN CSS FILE -->
    <link rel="stylesheet" href="css/style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prata&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <div class="site-id">
                <h1><a href="index.html"><img src="img/logo.png" alt="Name" width="72" height="72"/></a></h1>
            </div>
            <nav class="site-nav">
                <ul>
                    <li><a href="works.html">Works</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="site-main">
        <section id="hero" class="hero">
                <h1><img src="img/welcomegif.gif" width="1920" height="700"/></h1>
        </section>
        <section>
            <div class="caption">
                <div class="container">
                    <h2>Hi, it's Vivian, want to see more of my work?</h2>
                    <h4>View all of my works <a href="works.html">here.</a></h4>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="column one-third">
                        <a href="tourismlogo.html"><img src="img/tourism_logo.jpg" alt="Image of a side-faced cat incorporated with Ottoman design" width="1500" height="1500"/></a>
                    </div>
                    <div class="column one-third">
                        <a href="booktrilogy.html"><img src="img/booktrilogy.jpg" alt="Image of three book covers" width="1500" height="1500"/></a>
                    </div>
                    <div class="column one-third">
                        <a href="corporatelogo.html"><img src="img/corporate_logo.jpg" alt="Image of a ancient Vietnamese figure holding a coffee plant" width="1500" height="1500"/></a>
                    </div>
                </div>
                <div class="row">
                    <div class="column one-third">
                        <a href="typography.html"><img src="img/editorial_homepage.jpg" alt="Image of a Tiramisu recipe spread" width="1500" height="1500"/></a>
                    </div>
                    <div class="column one-third">
                        <a href="motiongraphic.html"><img src="img/motiongraphic.jpg" alt="Image of Kahuku Farm logo" width="1500" height="1500"/></a>
                    </div>
                    <div class="column one-third">
                        <a href="webdesign.html"><img src="img/webdesign_homepage.jpg" alt="Image of a iMac screen with web design layout" width="1500" height="1500"/></a>
                    </div>
                </div>
            </div>
        </section> 


        <section id="contact">
            <div class="container">
                <div class="row">
                    <div class="column two-thirds">
                        <h2>Where <em>Creativity</em> meets <em>Reality.</em></h2>
                        <h4>Let's Connect!</h4>
                    </div>

                    <div class="column one-third">
                        <form>
                            <label for="contact_name">Name:</label>
                            <input type="text" id="contact_name" name="contact_name" />
                
                            <label for="email">Email Address:</label>
                            <input type="text" id="contact_email" name="contact_email" />
                
                            <label for="contact_message">Message:</label>
                            <textarea id="contact_message" name="contact_message"></textarea>
                
                            <input type="submit" value="Get in touch" />
                        </form>
                    </div>  
                </div>
            </div>  
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="works.html">WORKS</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                </ul>
            </nav>
        </div>
    </footer>

        <!-- MAIN JS FILE -->
     <script src="js/script.js"></script>

</body>
</html>
